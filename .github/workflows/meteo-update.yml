name: Actualitzacio Automatica Meteo

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualitzar-dades:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar llibreries
        run: pip install -r requirements.txt

      - name: Executar script de descarrega
        run: python update_meteo.py

      - name: Commit automàtic de canvis
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add web_data/
          if git diff --staged --quiet; then
            echo "✅ No hi ha canvis a web_data/"
          else
            git commit -m "🔄 Actualització automàtica $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi